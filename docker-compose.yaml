services:
  nginx-app:
    image: ${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}
    #build:
    #  context: ./nginx
    #  dockerfile: Dockerfile
    container_name: nginx-container
    ports:
      - "80:80"
    volumes:
      - /home/ec2-user/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/ec2-user/nginx/html:/usr/share/nginx/html
      - /home/ec2-user/nginx/logs:/var/log/nginx
    restart: always
    networks:
      public-subnet:
        aliases:
          - nginx-svc


networks:
  public-subnet:
    driver: bridge
    name: public-subnet
